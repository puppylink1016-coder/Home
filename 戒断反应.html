body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;}

.back-arrow{position:absolute;left:16px;font-size:20px;color:#000;font-weight:300;}
.header-center{display:flex;flex-direction:column;align-items:center;}
.header-name{font-size:17px;font-weight:600;color:#000;}
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;}

.time-divider{text-align:center;margin:12px 0 8px;font-size:12px;color:#999;background:transparent;}

.msg-row{display:flex;margin:2px 0;max-width:100%;}
.msg-row.left{justify-content:flex-start;}
.msg-row.right{justify-content:flex-end;}
.avatar{width:40px;height:40px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;}

.msg-row.right .avatar{margin-left:8px;order:2;background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.bubble{max-width:240px;padding:9px 13px;border-radius:6px;font-size:15px;line-height:1.5;word-break:break-word;position:relative;}
.msg-row.left .bubble{background:#fff;color:#000;border-top-left-radius:2px;}
.msg-row.right .bubble{background:#95EC69;color:#000;border-top-right-radius:2px;}
.bubble::before{content:'';position:absolute;top:12px;width:0;height:0;}
.msg-row.left .bubble::before{left:-6px;border-top:4px solid transparent;border-bottom:4px solid transparent;border-right:6px solid #fff;}
.msg-row.right .bubble::before{right:-6px;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid #95EC69;}
.input-bar{background:#F6F6F6;padding:8px 12px;display:flex;align-items:center;gap:8px;border-top:0.5px solid #d6d6d6;flex-shrink:0;}
.input-field{flex:1;background:#fff;border:0.5px solid #ddd;border-radius:6px;padding:8px 12px;font-size:15px;color:#999;}
.input-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#666;font-size:20px;}
.title-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(26,26,46,0.97) 0%,rgba(26,26,46,0.85) 60%,transparent 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:1;transition:opacity 1.5s ease;pointer-events:auto;cursor:pointer;}
.title-overlay.fade{opacity:0;pointer-events:none;}
.title-main{font-size:28px;color:#fff;font-weight:300;letter-spacing:12px;margin-bottom:16px;}
.title-sub{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:4px;}
.title-hint{position:absolute;bottom:60px;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:2px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.25;}50%{opacity:0.6;}}
@media(max-width:420px){.phone{width:100%;height:100vh;border-radius:0;}}

var idx=0;
var chatArea=document.getElementById('chatArea');
function createMsg(m){
if(m.type==='time'){
var d=document.createElement('div');
d.className='time-divider';
d.innerHTML='<span class="time-pill">'+m.text+'</span>';
return d;
}
var row=document.createElement('div');
row.className='msg-row '+(m.side==='left'?'left':'right');
var avatar=document.createElement('div');
avatar.className='avatar';
avatar.textContent=m.side==='left'?'聿':'昭';
var bubble=document.createElement('div');
bubble.className='bubble';
bubble.textContent=m.text;
if(m.side==='left'){
row.appendChild(avatar);
row.appendChild(bubble);
}else{
row.appendChild(bubble);
row.appendChild(avatar);
}
return row;
}
function showNext(){
if(idx>=messages.length)return;
var m=messages[idx];
var el=createMsg(m);
el.style.opacity='0';
el.style.transform='translateY(8px)';
chatArea.appendChild(el);
setTimeout(function(){
el.style.transition='opacity 0.25s ease, transform 0.25s ease';
el.style.opacity='1';
el.style.transform='translateY(0)';
},20);
chatArea.scrollTop=chatArea.scrollHeight;
idx++;
var delay=120;
if(m.type==='time')delay=600;
else if(idx<messages.length&&messages[idx].type==='time')delay=400;
else if(idx>0&&messages[idx-1]&&messages[idx-1].side!==undefined&&idx<messages.length&&messages[idx].side!==undefined&&messages[idx-1].side!==messages[idx].side)delay=350;
setTimeout(showNext,delay);
}
function showAll(){
for(var i=0;i<messages.length;i++){
var el=createMsg(messages[i]);
chatArea.appendChild(el);
}
chatArea.scrollTop=chatArea.scrollHeight;
idx=messages.length;
}
function startChat(){
var overlay=document.getElementById('titleOverlay');
overlay.classList.add('fade');
setTimeout(function(){overlay.style.display='none';showNext();},800);
}
chatArea.addEventListener('click',function(){
if(idx>0&&idx<messages.length){showAll();}
});
